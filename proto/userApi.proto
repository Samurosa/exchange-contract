syntax = "proto3";

package proto;

option go_package = "../generated";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

enum Role {

    ROLE_UNSPECIFIED = 0;

    USER = 1;

    ADMIN = 2;

}

service UserService {
    rpc Create(CreateUserRequest)
        returns (CreateUserResponse);

    rpc Get(GetRequest)
        returns (GetResponse);

    rpc Update(UpdateRequest)
        returns (UpdateResponse);

    rpc Delete(DeleteRequest)
        returns (DeleteResponse);

    rpc Deposit(DepositRequest)
        returns (DepositResponse);

    rpc ValidateBalance(ValidateBalanceRequest)
        returns (ValidateBalanceResponse);

    rpc Authorization(AuthorizationRequest) returns (AuthorizationResponse);
}
message Balance {

    string asset = 1;

    string available = 2;

    string locked = 3;

}

message User{
    string id = 1;
    string name = 2;
    string login = 3;

    repeated Balance balances = 4;

    Role role = 5;
    
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message CreateUserRequest  {

    string name = 1;
    string login = 2;
    string password = 3;
    
    Role role = 4;
}
message CreateUserResponse { 

    User user = 1;

    google.protobuf.Timestamp created_at = 2;
}

message GetRequest{

    string id = 1;

}
message GetResponse {

    string id = 1;
    string name = 2;
    string login = 3;

    repeated Balance balances = 4;

    Role role = 5;

    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message UpdateRequest{

    string id = 1;

    google.protobuf.StringValue name = 2;
    google.protobuf.StringValue login = 3;
    google.protobuf.StringValue password = 4;

}
message UpdateResponse{

    google.protobuf.Timestamp updated_at = 1;

}

message DeleteRequest{

    string id = 1;

}
message DeleteResponse{

    bool success = 1;

}

message DepositRequest  {

    string user_id = 1;

    string asset = 2;

    string amount = 3;

}

message DepositResponse {

    Balance balance = 1;

}

message ValidateBalanceRequest {

    string user_id = 1;

    string asset = 2;

    string amount = 3;
}

message ValidateBalanceResponse{

    bool success = 1;

}

message AuthorizationRequest{

    string login = 1;
    string password = 2;

}

message AuthorizationResponse {

    string id = 1;

}