syntax = "proto3";

package user;

option go_package = "github.com/Samurosa/exchange-contract/protobuf/gen/go/user;user";

import "google/protobuf/timestamp.proto";
import "validate/validate.proto";
import "shared/shared.proto";

enum Role {

    ROLE_UNSPECIFIED = 0;

    ROLE_USER = 1;
    
    ROLE_GUEST = 2;
    
    ROLE_PREMIUM = 3;

    ROLE_ADMIN = 4;

}

service UserService {
    rpc Registration(RegisterUserRequest)
        returns (RegisterUserResponse);

    rpc GetUser(UserIDRequest)
        returns (UserInfoResponse);

    rpc UpdateUserInfo(UpdateUserInfoRequest)
        returns (UpdateUserInfoResponse);

    rpc DeleteUser(UserIDRequest)
        returns (DeleteUserResponse);

    rpc ChangePassword(ChangeUserRequest)
        returns (ChangeUserResponse);

    rpc Deposit(DepositRequest)
        returns (DepositResponse);

    rpc Login(LoginRequest)
        returns (TokenPairResponse);

    rpc Logout(RefreshTokenRequest)
        returns (LogoutResponse);

    rpc GetBalance(UserIDRequest)
        returns(UserBalanceInfoResponse);
    
    rpc RefreshToken(RefreshTokenRequest)
        returns (TokenPairResponse);
}

message Balance {

    string asset = 1;

    string available = 2;

    string locked = 3;

}

message RegisterUserRequest  {
        string email = 1 [
        (validate.rules).string.email = true
    ];

    string password = 2 [
        (validate.rules).string = {
            min_len: 6,
            max_len: 64,
        }
    ];
    string name = 3 [
    (validate.rules).string = {
            min_len: 2,
            max_len: 64,
        }
    ];
}
message RegisterUserResponse { 
    string id = 1;
    TokenPairResponse tokens = 2;
    google.protobuf.Timestamp created_at = 3;
}

message UserIDRequest{
    string id = 1 [
        (validate.rules).string.uuid = true
    ];
}
message UserInfoResponse {
    string id = 1;
    string name = 2;
    string email = 3;

    repeated Balance balances = 4;

    Role role = 5;

    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message UpdateUserInfoRequest{
    string id = 1 [
        (validate.rules).string.uuid = true
    ];
    

    optional string name = 2  [
    (validate.rules).string = {
            min_len: 2,
            max_len: 64,
        }
    ];
    optional string email = 3 [
        (validate.rules).string.email = true
    ];
}
message UpdateUserInfoResponse{
    bool updated = 1;

    google.protobuf.Timestamp updated_info_at = 2;
}

message DeleteUserResponse{
    bool success = 1;

    google.protobuf.Timestamp deleted_user_at = 2;
}

message DepositRequest  {
    string id = 1[
        (validate.rules).string.uuid = true
    ];

    string asset = 2[
        (validate.rules).string = {
        min_len: 1,
        max_len: 20,
        pattern: "^[A-Z_]+$"
        }
    ];

    shared.Money amount = 3 [
    (validate.rules).message = {
        required: true
    }
];
}

message DepositResponse {
    bool success = 1;
    Balance balance = 2;
}

message LoginRequest{
    string email = 1 [
        (validate.rules).string.email = true
    ];

    string password = 2 [
        (validate.rules).string = {
            min_len: 6,
            max_len: 64,
        }
    ];
}

message TokenPairResponse {
    string access_token = 1;
    string refresh_token = 2;

    google.protobuf.Timestamp access_expires_at = 3;
    google.protobuf.Timestamp refresh_expires_at = 4;
}

message UserBalanceInfoResponse{
    repeated Balance balances = 1;
}

message RefreshTokenRequest{
    string refresh_token = 1;

    string device_id = 2;
}

message LogoutResponse{
    bool success = 1;

    google.protobuf.Timestamp logged_out_at = 2;
}

message ChangeUserRequest {
    string id = 1 [
        (validate.rules).string.uuid = true
    ];

    string old_password = 2 [
        (validate.rules).string = {
            min_len: 6,
            max_len: 64
        }
    ];
    string new_password = 3 [
        (validate.rules).string = {
            min_len: 6,
            max_len: 64
        }
    ];
}

message ChangeUserResponse {
    bool success = 1;

    google.protobuf.Timestamp user_password_changed_at = 2;
}